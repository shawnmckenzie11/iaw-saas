# Fly.io config for iaw-saas (API + PWA on one app).
# Custom domain: iaw.mckenzian.com (see DEPLOY.md)

app = 'iaw-saas'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  SERVE_FRONTEND = 'true'
  FRONTEND_DIST = '/app/frontend/dist'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  strategy = 'rolling'
